<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>희테라피 관리자</title>

<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="login-box" id="loginBox">
    <h1>희테라피 관리자</h1>

    <input id="id" type="text" placeholder="아이디">
    <input id="pw" type="password" placeholder="비밀번호">

    <button onclick="login()">로그인</button>
</div>

<div class="admin-wrap" id="adminWrap" style="display:none;">

    <h1>관리자 페이지</h1>

    <div class="card">
        <h2>관리사 관리</h2>

        <button>관리사 추가</button>
        <button>관리사 수정</button>
        <button>관리사 삭제</button>
    </div>

    <div class="card">
        <h2>메인 설정</h2>

        <button>메인사진 변경</button>
        <button>메인문구 변경</button>
    </div>

    <div class="card">
        <h2>코스 관리</h2>

        <button>가격 변경</button>
        <button>코스 추가</button>
    </div>

</div>

<script>
function login(){
  const id = document.getElementById("id").value.trim();
  const pw = document.getElementById("pw").value.trim();

  if(id === "heetherapy" && pw === "qorrha!12"){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminWrap").style.display = "block";
  }else{
    alert("아이디 또는 비밀번호가 틀렸습니다.");
  }
}
</script>

</body>
</html>
